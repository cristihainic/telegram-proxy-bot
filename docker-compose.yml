services:
  bot:
    build:
      context: .
      args:
        INSTALL_DEV: "false"
    expose:
      - 8000
    ports:
      # Bind to localhost only — a reverse proxy (nginx/Caddy) on the host is
      # expected to terminate TLS and forward to 127.0.0.1:8000. Change to
      # "8000:8000" if you want to expose Sanic directly to the internet.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./bot:/proxybot/bot
    secrets:
      - BOT_API_KEY  # fetch in app by reading /run/secrets/BOT_API_KEY
    env_file:
      - .env

secrets:
  BOT_API_KEY:
    file: ./secrets/bot_api_key

